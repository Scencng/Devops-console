# Generated by deploy.sh. Manual edits may be overwritten on the next deploy.
server:
  port: ":8081"
  log_level: "info"

database:
  type: "mysql"
  auto_migrate: true
  mysql:
    host: "mysql"
    port: 3306
    username: "root"
    password: "ChangeThisMysqlRootPassword"
    database: "kafka_console"
    charset: "utf8mb4"
    parse_time: true
    max_open_conns: 10
    max_idle_conns: 5

logging:
  format: "json"
  time_format: "2006-01-02 15:04:05"
  report_caller: true

prometheus:
  base_url: "http://host.docker.internal:9090"
  timeout: 10

swagger:
  enabled: false
  host: "localhost:8081"
  base_path: "/"

health:
  enabled: true
  endpoint: "/health"
  interval: 30

redis:
  host: "redis"
  port: 6379
  username: ""
  password: "ChangeThisRedisPassword"
  db: 0

jwt:
  secret: "ChangeThisJwtSecretToALongRandomString"
  expire-time: 3600
  refresh-expire-time: 604800
  exclude-paths:
    - /api/v1/system/login
    - /swagger/*
    - /metrics
    - /health
