apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kafka-console.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: {{ include "kafka-console.name" . }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kafka-console.name" . }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kafka-console.name" . }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8081
              name: http
            - containerPort: 9090
              name: metrics
          env:
            - name: TZ
              value: {{ .Values.env.TZ | quote }}
            - name: PROMETHEUS_BASE_URL
              value: {{ .Values.env.PROMETHEUS_BASE_URL | quote }}
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-console.fullname" . }}-secret
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-console.fullname" . }}-secret
                  key: MYSQL_PORT
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-console.fullname" . }}-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-console.fullname" . }}-secret
                  key: MYSQL_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-console.fullname" . }}-secret
                  key: MYSQL_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-console.fullname" . }}-secret
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-console.fullname" . }}-secret
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-console.fullname" . }}-secret
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kafka-console.fullname" . }}-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
{{ toYaml .Values.resources.backend | indent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kafka-console.fullname" . }}-frontend
  labels:
    app.kubernetes.io/name: {{ include "kafka-console.name" . }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kafka-console.name" . }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kafka-console.name" . }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontendImage.repository }}:{{ .Values.frontendImage.tag }}"
          imagePullPolicy: {{ .Values.frontendImage.pullPolicy }}
          ports:
            - containerPort: 8081
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
{{ toYaml .Values.resources.frontend | indent 12 }}
