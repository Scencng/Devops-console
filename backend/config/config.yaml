# DevOps Console 配置文件
# 支持环境变量覆盖，如: DEVOPS_DATABASE_HOST, DEVOPS_DATABASE_PORT, DEVOPS_DATABASE_USER, DEVOPS_DATABASE_PASSWORD, DEVOPS_DATABASE_NAME

# 服务配置
server:
  port: ":18081"
  log_level: "info"  # debug, info, warn, error

# 数据库配置
database:
  type: "mysql"  # 仅支持MySQL
  auto_migrate: true  # 是否自动迁移数据库模型

  # MySQL配置
  mysql:
    #    host: "mysql"  # Docker容器中的服务名
    #    port: 3306
    #    username: "devops"  # Docker环境中的用户
    #    password: "devops123456"  # Docker环境中的密码
    #    database: "devops_console"
    #    host: "47.104.247.159"  # Docker容器中的服务名
    #    port: 8002
    #    username: "root"  # Docker环境中的用户
    #    password: "peppa-pig"  # Docker环境中的密码
    #    database: "devops_console"
    host: "127.0.0.1"  # Docker容器中的服务名
    port: 3306
    username: "devops"  # WSL本机可用数据库用户
    password: "devops123456"  # WSL本机数据库密码
    database: "devops_console"
    charset: "utf8mb4"
    parse_time: true
    max_open_conns: 10
    max_idle_conns: 5

# 日志配置
logging:
  format: "json"  # json, text
  time_format: "2006-01-02 15:04:05"
  report_caller: true

# 应用配置
app:
  name: "DevOps Console"
  version: "1.0.0"
  environment: "development"  # development, production

# Elasticsearch配置
elasticsearch:
  timeout: 30  # 连接超时时间（秒）
  retry: 3    # 重试次数
  health_check_interval: 60  # 健康检查间隔（秒）

# Kubernetes配置
kubernetes:
  config_path: ""  # kubeconfig文件路径，为空时使用集群内配置
  timeout: 30      # 操作超时时间（秒）
  retry: 3         # 重试次数

# Swagger配置
swagger:
  enabled: true
  host: "localhost:18081"
  base_path: "/"

# 健康检查配置
health:
  enabled: true
  endpoint: "/health"
  interval: 30  # 检查间隔（秒）

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0
ai:
  mcp:
    enabled: true
    url: "http://127.0.0.1:8080"
    token: "" # apikey
    max_retries: 3

jwt:
  secret: "n02y2Zqf4eL0hZ4xjQH9w1zDk1w5FqMnc9R+N8T1v2E="
  expire-time: 3600 # 单位为秒
  refresh-expire-time: 604800
  exclude-paths:
    - /api/v1/system/login
    - /api/v1/sysUser/refresh
    - /api/v1/sysUser/captcha
    - /swagger/*
    - /jobs/script/
    - /metrics
    - /ws/*
    - /health

# 加密配置 (用于敏感数据如主机密码等)
encryption:
  key: "So722DGlBzRASCG9so/Knfuy81cdhQ7gArgZjcJHvpQ="  # AES-256 key, base64 encoded, 32 bytes


feishu:
  webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/xxx" # 飞书 webhook地址
  secret: "" # 飞书 secret
  appId: "" # 飞书 appId 机器人签名校验可能用
  appSecret: "" # 飞书 appSecret 调用飞书开放平台 API 才用
  enabled: true # 是否开启该功能
